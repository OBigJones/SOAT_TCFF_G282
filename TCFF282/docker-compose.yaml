volumes:
  mysql_data:
    name: mysql_fiap

services:
  database:
    image: mysql:8.0
    restart: always
    ports: # remover porta do mysql pois só foi gerada para visualização
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: fiap-teste
      MYSQL_DATABASE: fiap
      MYSQL_USER: fiap
      MYSQL_PASSWORD: teste-123
    volumes:
      - mysql_data:/var/lib/mysql
      - "./scripts/ini.sql:/docker-entrypoint-initdb.d/ini.sql"
  app:
    depends_on:
      - database
    build:
      context: .
      dockerfile: Dockerfile
    ports: # porta da aplicação após decisão alterar
      - 5000:80
    environment:
      MYSQL_DB_HOST: mysql:3306
      MYSQL_DB_USER: fiap
      MYSQL_DB_PASSWORD: teste-123
      MYSQL_DB_NAME: fiap